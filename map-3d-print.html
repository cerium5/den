<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harita → 3D Baskı STL</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: #eee; height: 100vh; display: flex; flex-direction: column; }
  header { padding: 10px 16px; background: #16213e; border-bottom: 1px solid #0f3460; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  header h1 { font-size: 1rem; color: #e94560; white-space: nowrap; }
  .controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; flex: 1; }
  .ctrl-group { display: flex; flex-direction: column; gap: 2px; }
  .ctrl-group label { font-size: 0.68rem; color: #aaa; white-space: nowrap; }
  .ctrl-group input[type=range] { width: 100px; accent-color: #e94560; }
  select { background: #0f3460; color: #fff; border: 1px solid #e94560; border-radius: 4px; padding: 4px 6px; font-size: 0.8rem; }
  button { padding: 7px 14px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.82rem; font-weight: 600; transition: opacity 0.2s; white-space: nowrap; }
  button:hover { opacity: 0.85; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  #btn-draw { background: #0f3460; color: #fff; }
  #btn-generate { background: #e94560; color: #fff; }
  #btn-clear { background: #555; color: #fff; }
  #map { flex: 1; }
  #statusbar { padding: 5px 14px; background: #16213e; font-size: 0.76rem; color: #aaa; border-top: 1px solid #0f3460; min-height: 26px; display: flex; align-items: center; gap: 10px; }
  #progress-wrap { display: none; width: 200px; }
  progress { width: 100%; height: 7px; appearance: none; border-radius: 4px; accent-color: #e94560; }
  .info-box { position: absolute; bottom: 44px; right: 10px; z-index: 1000; background: rgba(22,33,62,0.93); border: 1px solid #0f3460; border-radius: 8px; padding: 10px 13px; font-size: 0.73rem; color: #ccc; max-width: 210px; line-height: 1.6; }
  .info-box strong { color: #e94560; }
  #area-info { color: #7ec8e3; font-weight: 600; }
</style>
</head>
<body>

<header>
  <h1>🗺️ Harita → 3D STL</h1>
  <div class="controls">

    <div class="ctrl-group">
      <label>Çıktı boyutu</label>
      <select id="sel-size">
        <option value="100">100 mm</option>
        <option value="150">150 mm</option>
        <option value="200" selected>200 mm</option>
        <option value="250">250 mm</option>
        <option value="300">300 mm</option>
        <option value="400">400 mm</option>
      </select>
    </div>

    <div class="ctrl-group">
      <label>Z Ölçeği: <span id="lbl-z">5</span>×</label>
      <input type="range" id="sl-z" min="1" max="20" value="5">
    </div>

    <div class="ctrl-group">
      <label>Taban (mm): <span id="lbl-base">3</span></label>
      <input type="range" id="sl-base" min="1" max="10" value="3">
    </div>

    <button id="btn-draw">📐 Bölge Seç</button>
    <button id="btn-generate" disabled>⬇️ STL İndir</button>
    <button id="btn-clear">🗑️ Temizle</button>
  </div>
</header>

<div id="map"></div>

<div class="info-box">
  <strong>Nasıl kullanılır?</strong><br>
  1. <em>Bölge Seç</em> → dikdörtgen çiz<br>
  2. Boyut &amp; Z ölçeği ayarla<br>
  3. <em>STL İndir</em> → .stl dosyası<br>
  4. Cura / PrusaSlicer'da aç
</div>

<div id="statusbar">
  <span id="status-text">Bölge seçmek için "Bölge Seç" butonuna tıklayın.</span>
  <span id="area-info"></span>
  <div id="progress-wrap"><progress id="pbar" max="100" value="0"></progress></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
<script>
// ── Map (zoomed out to show Europe/Middle East) ───────────────────────────────
const map = L.map('map').setView([45, 20], 4);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap contributors', maxZoom: 19
}).addTo(map);

const drawnItems = new L.FeatureGroup().addTo(map);
const drawControl = new L.Control.Draw({
  draw: {
    rectangle: {
      shapeOptions: { color: '#e94560', weight: 2, fillOpacity: 0.08 },
      // No size limit — allow any size rectangle
    },
    polygon: false, polyline: false, circle: false, circlemarker: false, marker: false
  },
  edit: { featureGroup: drawnItems, remove: false }
});

let currentBounds = null;

const slZ      = document.getElementById('sl-z');
const slBase   = document.getElementById('sl-base');
const selSize  = document.getElementById('sel-size');
const lblZ     = document.getElementById('lbl-z');
const lblBase  = document.getElementById('lbl-base');
const btnDraw  = document.getElementById('btn-draw');
const btnGen   = document.getElementById('btn-generate');
const btnClear = document.getElementById('btn-clear');
const statusTxt  = document.getElementById('status-text');
const areaInfo   = document.getElementById('area-info');
const progWrap   = document.getElementById('progress-wrap');
const pbar       = document.getElementById('pbar');

slZ.addEventListener('input',    () => lblZ.textContent = slZ.value);
slBase.addEventListener('input', () => lblBase.textContent = slBase.value);

function setStatus(msg) { statusTxt.textContent = msg; }
function setArea(msg)   { areaInfo.textContent = msg; }
function setProgress(v, max) {
  progWrap.style.display = 'block';
  pbar.max = max; pbar.value = v;
  if (v >= max) setTimeout(() => progWrap.style.display = 'none', 800);
}

function haverDist(lat1, lng1, lat2, lng2) {
  const R = 6371, dLat = (lat2-lat1)*Math.PI/180, dLng = (lng2-lng1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)); // km
}

btnDraw.addEventListener('click', () => {
  map.addControl(drawControl);
  new L.Draw.Rectangle(map, drawControl.options.draw.rectangle).enable();
  setStatus('Haritada istediğiniz büyüklükte dikdörtgen çizin...');
});

btnClear.addEventListener('click', () => {
  drawnItems.clearLayers(); currentBounds = null; btnGen.disabled = true;
  setStatus('Temizlendi.'); setArea('');
});

map.on(L.Draw.Event.CREATED, (e) => {
  drawnItems.clearLayers();
  drawnItems.addLayer(e.layer);
  currentBounds = e.layer.getBounds();
  btnGen.disabled = false;
  const sw = currentBounds.getSouthWest(), ne = currentBounds.getNorthEast();
  const w = haverDist(sw.lat, sw.lng, sw.lat, ne.lng);
  const h = haverDist(sw.lat, sw.lng, ne.lat, sw.lng);
  setStatus('Bölge seçildi ✓  →  STL İndir butonuna basın');
  setArea(`${Math.round(w)} × ${Math.round(h)} km`);
});

// ── Terrain-RGB tiles (AWS S3, Terrarium format, no key, no rate limit) ───────
function deg2tile(lat, lng, zoom) {
  const n = 2**zoom;
  const x = Math.floor((lng + 180) / 360 * n);
  const lr = lat * Math.PI / 180;
  const y = Math.floor((1 - Math.log(Math.tan(lr) + 1/Math.cos(lr)) / Math.PI) / 2 * n);
  return { x, y };
}

function latLngToPixel(lat, lng, zoom, tx, ty) {
  const n = 2**zoom;
  const wx = (lng + 180) / 360 * n;
  const lr = lat * Math.PI / 180;
  const wy = (1 - Math.log(Math.tan(lr) + 1/Math.cos(lr)) / Math.PI) / 2 * n;
  return {
    px: Math.min(255, Math.max(0, Math.floor((wx - tx) * 256))),
    py: Math.min(255, Math.max(0, Math.floor((wy - ty) * 256)))
  };
}

const tileCache = {};

function loadTile(zoom, tx, ty) {
  const key = `${zoom}/${tx}/${ty}`;
  if (tileCache[key]) return Promise.resolve(tileCache[key]);
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => {
      const cv = document.createElement('canvas');
      cv.width = cv.height = 256;
      const ctx = cv.getContext('2d');
      ctx.drawImage(img, 0, 0);
      try {
        const d = ctx.getImageData(0, 0, 256, 256).data;
        tileCache[key] = d; resolve(d);
      } catch(e) { reject(new Error('CORS hatası: tile okunamadı')); }
    };
    img.onerror = () => reject(new Error(`Tile yüklenemedi: ${key}`));
    img.src = `https://s3.amazonaws.com/elevation-tiles-prod/terrarium/${zoom}/${tx}/${ty}.png`;
  });
}

async function buildElevGrid(bounds, N, onProgress) {
  const sw = bounds.getSouthWest(), ne = bounds.getNorthEast();
  const latSpan = Math.abs(ne.lat - sw.lat);
  // Pick zoom based on region size
  let zoom;
  if      (latSpan > 20) zoom = 5;
  else if (latSpan > 10) zoom = 6;
  else if (latSpan > 5)  zoom = 7;
  else if (latSpan > 2)  zoom = 8;
  else if (latSpan > 0.5) zoom = 10;
  else if (latSpan > 0.1) zoom = 12;
  else                    zoom = 13;

  // Unique tiles
  const needed = new Set();
  for (let r = 0; r < N; r++) for (let c = 0; c < N; c++) {
    const lat = sw.lat + (ne.lat - sw.lat) * r / (N-1);
    const lng = sw.lng + (ne.lng - sw.lng) * c / (N-1);
    const t = deg2tile(lat, lng, zoom);
    needed.add(`${t.x},${t.y}`);
  }

  const tiles = [...needed];
  setStatus(`Yükseklik tile'ları yükleniyor… (${tiles.length} tile, zoom ${zoom})`);
  let loaded = 0;
  await Promise.all(tiles.map(async key => {
    const [tx, ty] = key.split(',').map(Number);
    await loadTile(zoom, tx, ty);
    onProgress(++loaded, tiles.length);
  }));

  return Array.from({length: N}, (_, r) =>
    Array.from({length: N}, (_, c) => {
      const lat = sw.lat + (ne.lat - sw.lat) * r / (N-1);
      const lng = sw.lng + (ne.lng - sw.lng) * c / (N-1);
      const t = deg2tile(lat, lng, zoom);
      const d = tileCache[`${zoom}/${t.x}/${t.y}`];
      const {px, py} = latLngToPixel(lat, lng, zoom, t.x, t.y);
      const i = (py * 256 + px) * 4;
      return d ? d[i]*256 + d[i+1] + d[i+2]/256 - 32768 : 0;
    })
  );
}

// ── STL builder ───────────────────────────────────────────────────────────────
function buildSTL(grid, zScale, baseMm, physW, physH) {
  const rows = grid.length, cols = grid[0].length;
  const flat = grid.flat();
  const minE = Math.min(...flat), range = (Math.max(...flat) - minE) || 1;
  const maxTerrainMm = 30;
  const dx = physW / (cols-1), dy = physH / (rows-1);
  const ez = e => ((e - minE) / range) * maxTerrainMm * (zScale / 4) + baseMm;
  const pt = (r, c) => ({x: c*dx, y: r*dy, z: ez(grid[r][c])});
  const tris = [];

  function tri(a, b, c) {
    const ux=b.x-a.x,uy=b.y-a.y,uz=b.z-a.z,vx=c.x-a.x,vy=c.y-a.y,vz=c.z-a.z;
    const nx=uy*vz-uz*vy,ny=uz*vx-ux*vz,nz=ux*vy-uy*vx,l=Math.sqrt(nx*nx+ny*ny+nz*nz)||1;
    tris.push({n:[nx/l,ny/l,nz/l],v:[a,b,c]});
  }

  for (let r=0;r<rows-1;r++) for (let c=0;c<cols-1;c++) {
    tri(pt(r,c), pt(r+1,c), pt(r+1,c+1));
    tri(pt(r,c), pt(r+1,c+1), pt(r,c+1));
  }

  const W=(cols-1)*dx, H=(rows-1)*dy;
  tri({x:0,y:0,z:0},{x:W,y:H,z:0},{x:W,y:0,z:0});
  tri({x:0,y:0,z:0},{x:0,y:H,z:0},{x:W,y:H,z:0});

  for (let c=0;c<cols-1;c++) {
    const t0=pt(0,c),t1=pt(0,c+1),f0={x:t0.x,y:t0.y,z:0},f1={x:t1.x,y:t1.y,z:0};
    tri(t0,f0,t1); tri(f0,f1,t1);
  }
  for (let c=0;c<cols-1;c++) {
    const t0=pt(rows-1,c),t1=pt(rows-1,c+1),f0={x:t0.x,y:t0.y,z:0},f1={x:t1.x,y:t1.y,z:0};
    tri(t0,t1,f0); tri(f0,t1,f1);
  }
  for (let r=0;r<rows-1;r++) {
    const t0=pt(r,0),t1=pt(r+1,0),f0={x:t0.x,y:t0.y,z:0},f1={x:t1.x,y:t1.y,z:0};
    tri(t0,t1,f0); tri(f0,t1,f1);
  }
  for (let r=0;r<rows-1;r++) {
    const t0=pt(r,cols-1),t1=pt(r+1,cols-1),f0={x:t0.x,y:t0.y,z:0},f1={x:t1.x,y:t1.y,z:0};
    tri(t0,f0,t1); tri(f0,f1,t1);
  }

  const buf = new ArrayBuffer(84 + tris.length*50);
  const dv = new DataView(buf);
  new TextEncoder().encodeInto('Map 3D Print'.padEnd(80), new Uint8Array(buf,0,80));
  dv.setUint32(80, tris.length, true);
  let off = 84;
  for (const t of tris) {
    for (const n of t.n) { dv.setFloat32(off,n,true); off+=4; }
    for (const p of t.v) { dv.setFloat32(off,p.x,true);off+=4;dv.setFloat32(off,p.y,true);off+=4;dv.setFloat32(off,p.z,true);off+=4; }
    dv.setUint16(off,0,true); off+=2;
  }
  return buf;
}

// ── Main ──────────────────────────────────────────────────────────────────────
btnGen.addEventListener('click', async () => {
  if (!currentBounds) return;
  btnGen.disabled = btnDraw.disabled = btnClear.disabled = true;
  try {
    const zScale  = parseInt(slZ.value);
    const baseMm  = parseInt(slBase.value);
    const maxDimMm = parseInt(selSize.value);
    const sw = currentBounds.getSouthWest(), ne = currentBounds.getNorthEast();
    const latSpan = Math.abs(ne.lat - sw.lat);

    // Grid resolution: balance quality vs tile count
    const N = latSpan > 10 ? 60 : latSpan > 3 ? 70 : latSpan > 0.5 ? 80 : 90;

    const grid = await buildElevGrid(currentBounds, N, (done, total) => setProgress(done, total));

    setStatus('STL oluşturuluyor…');
    const distW = haverDist(sw.lat, sw.lng, sw.lat, ne.lng);
    const distH = haverDist(sw.lat, sw.lng, ne.lat, sw.lng);
    const scale = maxDimMm / Math.max(distW, distH); // mm per km
    const physW = distW * scale;
    const physH = distH * scale;

    const stl = buildSTL(grid, zScale, baseMm, physW, physH);
    const fname = `harita_${sw.lat.toFixed(2)}_${sw.lng.toFixed(2)}.stl`;
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([stl], {type:'application/octet-stream'}));
    a.download = fname;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setStatus(`✅ İndirildi: ${fname}  (${(stl.byteLength/1024/1024).toFixed(1)} MB)  —  Cura / PrusaSlicer'da açın.`);
    setProgress(1,1);
  } catch(err) {
    setStatus(`❌ Hata: ${err.message}`);
    console.error(err);
  } finally {
    btnGen.disabled = btnDraw.disabled = btnClear.disabled = false;
  }
});
</script>
</body>
</html>
